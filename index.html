<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decifre o Enigma - Ordem Paranormal</title>
    <link rel="stylesheet" href="style/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="vignette"></div>

    <div class="container">
        <header>
            <h1 class="glitch" data-text="DECIFRE O CÓDIGO">DECIFRE O CÓDIGO</h1>
            <p class="subtitle">PROTOCOLO SIGMA // OPERAÇÃO NOSTAR</p>
            <div class="hud-grid">
                <div class="hud-card">
                    <span class="hud-label">RODADA</span>
                    <strong id="hudRound">01</strong>
                </div>
                <div class="hud-card">
                    <span class="hud-label">SUCESSOS</span>
                    <strong id="hudWins">00</strong>
                </div>
                <div class="hud-card">
                    <span class="hud-label">FALHAS</span>
                    <strong id="hudLosses">00</strong>
                </div>
                <div class="hud-card">
                    <span class="hud-label">AMEAÇA</span>
                    <strong id="hudThreat">BAIXA</strong>
                </div>
            </div>
            <div class="sanity-wrapper">
                <span>SANIDADE:</span>
                <div class="sanity-bar-container">
                    <div id="sanityBar" class="sanity-bar" style="width: 100%;"></div>
                </div>
            </div>
        </header>

        <div id="game-terminal">
            <div id="clueContainer">
                <p class="terminal-text">> ARQUIVO ENCONTRADO. DICA DISPONÍVEL:</p>
                <div class="clue-box">
                    <span id="clueText">CARREGANDO DADOS...</span>
                    <button id="hintButton">[ INVESTIGAR ]</button>
                </div>
            </div>

            <div id="wordContainer"></div>

            <div class="input-area">
                <input type="text" id="guessInput" maxlength="30" placeholder="Digitar..." autocomplete="off">
                <button id="btnGuess">PROCESSAR</button>
            </div>

            <p id="message" class="status-message"></p>

            <button id="btnReset" style="display:none;">REINICIAR MISSÃO</button>

            <section class="log-panel">
                <p class="terminal-text">> LOG DA OPERAÇÃO</p>
                <ul id="logList"></ul>
            </section>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 Diego.Dev // ORDEM PARANORMAL FANGAME</p>
    </footer>

    <script src="js/game.js"></script>
</body>
</html>
